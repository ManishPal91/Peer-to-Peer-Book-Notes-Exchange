{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <svg style="width: 48px; height: 48px; color: var(--geist-error); margin: 0 auto 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <h2 style="margin-bottom: 0.5rem;">Delete Listing</h2>
        <p class="text-muted">Are you sure you want to delete the listing <strong>"{{ object.title }}"</strong>? This action cannot be undone.</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="card-footer" style="justify-content: center; gap: 1rem;">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </div>
    </form>
</div>
{% endblock %}
