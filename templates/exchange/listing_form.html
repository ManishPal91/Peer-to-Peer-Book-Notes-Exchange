{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="margin: 0;">{% if form.instance.pk %}Edit Listing{% else %}Create New Listing{% endif %}</h2>
        <p class="text-muted" style="margin: 0; font-size: 0.875rem;">Fill out the details below to {% if form.instance.pk %}update your{% else %}add a new{% endif %} listing.</p>
    </div>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
            {{ form.as_p }}
        </div>
        <div class="card-footer">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Listing</button>
        </div>
    </form>
</div>

<style>
    /* Premium SaaS Form Styling for Django's as_p */
    form p {
        display: flex;
        flex-direction: column;
        margin-bottom: 1rem;
        position: relative;
    }
    form label {
        font-weight: 500;
        font-size: 0.875rem;
        color: var(--geist-accents-6);
        margin-bottom: 0.5rem;
    }
    form input[type="text"],
    form input[type="number"],
    form select,
    form textarea {
        width: 100%;
        height: 40px;
        padding: 0 0.75rem;
        border: 1px solid var(--geist-accents-2);
        border-radius: var(--radius-sm);
        background-color: var(--geist-surface);
        color: var(--geist-foreground);
        font-family: inherit;
        font-size: 0.875rem;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    form textarea {
        height: auto;
        min-height: 100px;
        padding: 0.75rem;
        resize: vertical;
    }
    form input:focus,
    form select:focus,
    form textarea:focus {
        outline: none;
        border-color: var(--geist-success);
        box-shadow: var(--shadow-glow);
    }
    form .helptext {
        font-size: 0.75rem;
        color: var(--geist-accents-4);
        margin-top: 0.25rem;
    }
    form .errorlist {
        color: var(--geist-error);
        font-size: 0.75rem;
        list-style: none;
        padding: 0;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
